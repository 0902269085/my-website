[build]
  base = "company-website"
  command = "npm run build"
  publish = "dist/company-website/browser"

[[redirects]]
  from = "/api/*"
  to = "https://my-website-1-cbhg.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "https://my-website-1-cbhg.onrender.com/uploads/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
