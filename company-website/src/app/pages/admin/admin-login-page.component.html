<section class="admin-auth">
  <div class="container">
    <div class="admin-auth__card">
      <p class="eyebrow">Quản trị nội dung</p>
      <h1>Đăng nhập khu vực quản trị</h1>
      <p class="admin-auth__note">
        Khu vực này dùng để đăng bài, sửa bài, xóa bài và đổi tài khoản quản trị.
      </p>

      <div class="admin-auth__form">
        <label class="form-field">
          <span>Tên đăng nhập</span>
          <input
            type="text"
            name="username"
            [(ngModel)]="loginData.username"
            placeholder="Nhập tên đăng nhập"
          />
        </label>

        <label class="form-field">
          <span>Mật khẩu</span>
          <input
            type="password"
            name="password"
            [(ngModel)]="loginData.password"
            placeholder="Nhập mật khẩu"
          />
        </label>

        @if (submitMessage) {
          <p class="form-status form-status--error">
            {{ submitMessage }}
          </p>
        }

        <button type="button" class="button button--primary" [disabled]="isSubmitting" (click)="submitLogin()">
          {{ isSubmitting ? 'Đang đăng nhập...' : 'Đăng nhập quản trị' }}
        </button>
      </div>
    </div>
  </div>
</section>
